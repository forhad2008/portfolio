<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Abdullah Forhad</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --primary-color: #b30000;
            /* Crimson Red */
            --secondary-color: #4a0000;
            /* Deep Blood Velvet */
            --accent-blue: #ff4d4d;
            /* Vivid Light Red / Coral Spark */
            --bg-light: #1a0303;
            /* Abyssal Crimson Night */
            --card-bg: rgba(20, 5, 5, 0.85);
            /* Dark Glass Tint */
            --text-dark: #fff5f5;
            /* Pure Ghostly White */
            --text-medium: #ff6666;
            /* Vibrant Crimson Rose */
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            pointer-events: none;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient background color blending mimicking a bloody ocean tide */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #1a0303 0%, #5c0606 40%, rgb(139, 0, 0) 100%);
            background-size: 200% 200%;
            animation: ocean-current 15s ease-in-out infinite alternate;
            opacity: 0.9;
            z-index: -1;
        }

        @keyframes ocean-current {
            0% {
                background-position: 50% 0%;
            }

            100% {
                background-position: 50% 100%;
            }
        }

        /* --- MATCHED BLOODY GLASS BOX EFFECT --- */
        .contact-card {
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            width: 100%;
            max-width: 500px;
            padding: 45px 35px;
            border-radius: 24px;
            border: 1px solid rgba(179, 0, 0, 0.15);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            z-index: 10;
            position: relative;
            overflow: hidden;
        }

        .contact-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 25%;
            height: 50%;
            width: 4px;
            background: var(--primary-color);
            border-radius: 0 4px 4px 0;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 35px;
            text-align: center;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(to right, var(--text-dark), var(--accent-blue));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: var(--text-dark);
        }

        .contact-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 14px 18px;
            background: rgba(40, 10, 10, 0.5);
            border-radius: 14px;
            border: 1px solid rgba(179, 0, 0, 0.1);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            text-decoration: none;
            color: inherit;
        }

        .contact-item:hover {
            background: rgba(74, 0, 0, 0.4);
            transform: translateY(-3px) scale(1.01);
            border-color: var(--accent-blue);
            box-shadow: 0 10px 20px rgba(179, 0, 0, 0.2);
        }

        .icon-box {
            width: 45px;
            height: 45px;
            background: rgba(179, 0, 0, 0.15);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--accent-blue);
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        .contact-item:hover .icon-box {
            background: var(--primary-color);
            color: #ffffff;
            box-shadow: 0 0 10px rgba(179, 0, 0, 0.4);
        }

        .contact-details {
            display: flex;
            flex-direction: column;
        }

        .contact-details h3 {
            font-size: 0.85rem;
            color: var(--text-medium);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .contact-details span {
            color: var(--text-dark);
            font-weight: 600;
            font-size: 1rem;
            word-break: break-word;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 35px;
            width: 100%;
            padding: 14px;
            background: transparent;
            color: var(--accent-blue);
            border: 2px solid var(--primary-color);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 50px;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .back-btn:hover {
            background: linear-gradient(45deg, var(--secondary-color), var(--primary-color));
            color: #ffffff;
            border-color: transparent;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(179, 0, 0, 0.4);
        }

        .reveal {
            opacity: 0;
        }
    </style>
</head>

<body>
    <div id="canvas-container"></div>

    <div class="contact-card">
        <h1 class="reveal">Contact Me</h1>

        <div class="contact-grid">
            <a href="mailto:abdullahforhad@email.com" class="contact-item reveal">
                <div class="icon-box">
                    <i class="fas fa-envelope"></i>
                </div>
                <div class="contact-details">
                    <h3>Email</h3>
                    <span>abdullahforhad@email.com</span>
                </div>
            </a>

            <div class="contact-item reveal">
                <div class="icon-box">
                    <i class="fas fa-map-marker-alt"></i>
                </div>
                <div class="contact-details">
                    <h3>Location</h3>
                    <span>Chittagong, Bangladesh</span>
                </div>
            </div>

            <a href="https://github.com" target="_blank" class="contact-item reveal">
                <div class="icon-box">
                    <i class="fab fa-github"></i>
                </div>
                <div class="contact-details">
                    <h3>GitHub</h3>
                    <span>github.com/abdullahforhad</span>
                </div>
            </a>
        </div>

        <a href="index.html" class="back-btn reveal">
            <i class="fas fa-arrow-left"></i> Back to Portfolio
        </a>
    </div>

    <script>
        // --- 3D BLOOD DROPLET / BUBBLE ENGINE ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });

        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        camera.position.z = 30;

        const bubbleCount = 35;
        const bubbles = [];
        const bubbleGroup = new THREE.Group();
        const bubbleGeo = new THREE.SphereGeometry(1, 32, 32);

        function createBubbleMaterial() {
            return new THREE.MeshPhysicalMaterial({
                color: 0x4a0000,           // Deep crimson blood base
                emissive: 0x1a0303,        // Dark abyssal core
                emissiveIntensity: 0.6,
                roughness: 0.08,
                metalness: 0.1,
                clearcoat: 1.0,
                clearcoatRoughness: 0.02,
                transmission: 0.4,          // Liquid fluid density
                ior: 1.4,
                thickness: 5.0,
                transparent: true,
                opacity: 0.85
            });
        }

        for (let i = 0; i < bubbleCount; i++) {
            const mesh = new THREE.Mesh(bubbleGeo, createBubbleMaterial());
            const scale = Math.random() * 1.0 + 0.3;
            mesh.scale.set(scale, scale, scale);
            mesh.position.x = (Math.random() - 0.5) * 55;
            mesh.position.y = (Math.random() - 0.5) * 45;
            mesh.position.z = (Math.random() - 0.5) * 15;

            mesh.userData = {
                speedY: (scale * 0.025) + 0.012,
                wobbleSpeed: Math.random() * 0.04 + 0.02,
                phaseX: Math.random() * Math.PI * 2,
                phaseZ: Math.random() * Math.PI * 2,
                baseScale: scale
            };
            bubbleGroup.add(mesh);
            bubbles.push(mesh);
        }
        scene.add(bubbleGroup);

        // Lights tuned for crimson visibility
        const skyLight = new THREE.DirectionalLight(0xffcccc, 2.5); // Soft red-white top reflection
        skyLight.position.set(10, 20, 8);
        scene.add(skyLight);

        const fillLight = new THREE.AmbientLight(0x3a0000, 1.2); // Warm dark-red ambient layer
        scene.add(fillLight);

        // Mouse tracking for parallax
        const mouse = { x: 0, y: 0 };
        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now();

            bubbles.forEach(bubble => {
                const p = bubble.userData;
                bubble.position.y += p.speedY;
                bubble.position.x += Math.sin(time * 0.002 + p.phaseX) * 0.02;

                if (bubble.position.y > 25) {
                    bubble.position.y = -25;
                    bubble.position.x = (Math.random() - 0.5) * 55;
                }
            });

            bubbleGroup.rotation.y += (mouse.x * 0.05 - bubbleGroup.rotation.y) * 0.05;
            bubbleGroup.rotation.x += (-mouse.y * 0.05 - bubbleGroup.rotation.x) * 0.05;

            renderer.render(scene, camera);
        }
        animate();

        // --- GSAP REVEAL ANIMATION ---
        window.addEventListener('DOMContentLoaded', () => {
            gsap.to(".reveal", {
                opacity: 1,
                y: 0,
                duration: 1.2,
                stagger: 0.12,
                ease: "power4.out",
                startAt: { y: 40 }
            });
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
