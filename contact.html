<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Abdullah Forhad</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        /* --- BOLD & EDITORIAL DESIGN MATRIX (Matched to Home) --- */
        :root {
            --bg-cream: #FFFDF9;
            --text-espresso: #2C1E1A;
            --text-muted: #6E5D58;
            --accent-terracotta: #C25A3F;
            --accent-hover: #A44830;
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Inter', sans-serif;
            --border-color: rgba(44, 30, 26, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-sans);
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            pointer-events: none;
        }

        body {
            background-color: var(--bg-cream);
            color: var(--text-espresso);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Fixed Minimal Editorial Guide Line */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 10%;
            width: 1px;
            height: 100%;
            background: var(--border-color);
            z-index: -1;
            pointer-events: none;
        }

        /* --- EDITORIAL CONTAINER --- */
        .contact-card {
            background: #FFFFFF;
            width: 100%;
            max-width: 550px;
            padding: 50px 40px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 40px rgba(44, 30, 26, 0.02);
            z-index: 10;
            position: relative;
        }

        /* Left Editorial Focus Accent Accent Border */
        .contact-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background: var(--accent-terracotta);
        }

        h1 {
            font-family: var(--font-serif);
            font-size: clamp(2.2rem, 4vw, 3rem);
            margin-bottom: 40px;
            font-weight: 600;
            letter-spacing: -1px;
            color: var(--text-espresso);
            line-height: 1.1;
        }

        .contact-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 16px 20px;
            background: #FFFDF9;
            border: 1px solid var(--border-color);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            text-decoration: none;
            color: inherit;
        }

        .contact-item:hover {
            border-color: var(--accent-terracotta);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(44, 30, 26, 0.04);
        }

        .icon-box {
            width: 46px;
            height: 46px;
            background: rgba(194, 90, 63, 0.08);
            border-radius: 0px;
            /* Kept blocky and clean */
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--accent-terracotta);
            font-size: 1.1rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(194, 90, 63, 0.15);
        }

        .contact-item:hover .icon-box {
            background: var(--accent-terracotta);
            color: #ffffff;
            border-color: transparent;
        }

        .contact-details {
            display: flex;
            flex-direction: column;
        }

        .contact-details h3 {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .contact-details span {
            color: var(--text-espresso);
            font-family: var(--font-serif);
            font-weight: 600;
            font-size: 1.1rem;
            word-break: break-word;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 40px;
            width: 100%;
            padding: 16px;
            background: transparent;
            color: var(--accent-terracotta);
            border: 1px solid var(--accent-terracotta);
            text-decoration: none;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .back-btn:hover {
            background: var(--text-espresso);
            color: #ffffff;
            border-color: var(--text-espresso);
            transform: translateY(-2px);
        }

        .reveal {
            opacity: 0;
        }

        @media (max-width: 480px) {
            .contact-card {
                padding: 35px 20px;
            }

            .contact-item {
                gap: 15px;
                padding: 14px 16px;
            }

            .contact-details span {
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>
    <div id="canvas-container"></div>

    <div class="contact-card">
        <h1 class="reveal">Contact Me</h1>

        <div class="contact-grid">
            <a href="mailto:forhadalpha08@email.com" class="contact-item reveal">
                <div class="icon-box">
                    <i class="fas fa-envelope"></i>
                </div>
                <div class="contact-details">
                    <h3>Email</h3>
                    <span>Send Email</span>
                </div>
            </a>

            <div class="contact-item reveal">
                <div class="icon-box">
                    <i class="fas fa-map-marker-alt"></i>
                </div>
                <div class="contact-details">
                    <h3>Location</h3>
                    <span>Bangladesh</span>
                </div>
            </div>

            <a href="https://wa.me/8801342900364" class="contact-item reveal" target="_blank">
                <div class="icon-box">
                    <i class="fab fa-whatsapp"></i>
                </div>
                <div class="contact-details">
                    <h3>WhatsApp</h3>
                    <span>Contact On WhatsApp</span>
                </div>
            </a>

            <a href="https://www.facebook.com/profile.php?id=61580779565120" target="_blank"
                class="contact-item reveal">
                <div class="icon-box">
                    <i class="fab fa-facebook"></i>
                </div>
                <div class="contact-details">
                    <h3>Facebook</h3>
                    <span>Facebook.com</span>
                </div>
            </a>
        </div>

        <a href="index.html" class="back-btn reveal">
            <i class="fas fa-arrow-left"></i> Return to Home
        </a>
    </div>

    <script>
        // --- 3D AMBIENT SILK FLOATING ENGINE (Editorial Update) ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });

        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        camera.position.z = 30;

        const bubbleCount = 20; // Lower count for subtle minimalism
        const bubbles = [];
        const bubbleGroup = new THREE.Group();
        const bubbleGeo = new THREE.SphereGeometry(1, 32, 32);

        function createBubbleMaterial() {
            return new THREE.MeshPhysicalMaterial({
                color: 0xC25A3F,           // Terracotta accent core
                emissive: 0xFFFDF9,        // Cream reflection glow
                emissiveIntensity: 0.1,
                roughness: 0.1,
                metalness: 0.05,
                clearcoat: 0.8,
                clearcoatRoughness: 0.1,
                transmission: 0.6,          // Sleek glass depth transparency
                ior: 1.2,
                thickness: 2.0,
                transparent: true,
                opacity: 0.25               // Barely visible mesh layer
            });
        }

        for (let i = 0; i < bubbleCount; i++) {
            const mesh = new THREE.Mesh(bubbleGeo, createBubbleMaterial());
            const scale = Math.random() * 1.5 + 0.5;
            mesh.scale.set(scale, scale, scale);
            mesh.position.x = (Math.random() - 0.5) * 55;
            mesh.position.y = (Math.random() - 0.5) * 45;
            mesh.position.z = (Math.random() - 0.5) * 15;

            mesh.userData = {
                speedY: (scale * 0.01) + 0.005,
                phaseX: Math.random() * Math.PI * 2,
                baseScale: scale
            };
            bubbleGroup.add(mesh);
            bubbles.push(mesh);
        }
        scene.add(bubbleGroup);

        // Warm directional lightning setup
        const skyLight = new THREE.DirectionalLight(0xFFFDF9, 2.0);
        skyLight.position.set(10, 20, 8);
        scene.add(skyLight);

        const fillLight = new THREE.AmbientLight(0xC25A3F, 0.4);
        scene.add(fillLight);

        // Mouse vector tracking for soft parallax
        const mouse = { x: 0, y: 0 };
        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now();

            bubbles.forEach(bubble => {
                const p = bubble.userData;
                bubble.position.y += p.speedY;
                bubble.position.x += Math.sin(time * 0.001 + p.phaseX) * 0.01;

                if (bubble.position.y > 25) {
                    bubble.position.y = -25;
                    bubble.position.x = (Math.random() - 0.5) * 55;
                }
            });

            bubbleGroup.rotation.y += (mouse.x * 0.03 - bubbleGroup.rotation.y) * 0.05;
            bubbleGroup.rotation.x += (-mouse.y * 0.03 - bubbleGroup.rotation.x) * 0.05;

            renderer.render(scene, camera);
        }
        animate();

        // --- GSAP REVEAL ANIMATION ---
        window.addEventListener('DOMContentLoaded', () => {
            gsap.to(".reveal", {
                opacity: 1,
                y: 0,
                duration: 1,
                stagger: 0.08,
                ease: "power3.out",
                startAt: { y: 30 }
            });
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
