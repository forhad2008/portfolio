<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Abdullah Forhad</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Syne:wght@500;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        /* --- HIGH-CONTRAST LIGHT MODE SYSTEM (Matched to Home) --- */
        :root {
            --bg-dark: #FFFFFF;              /* Pure Gallery White */
            --bg-card: #F8F9FA;              /* Minimalist Light Gray */
            --text-primary: #0A0A0C;         /* Rich Ink Black */
            --text-muted: #6B7280;           /* Mid Neutral Gray */
            --accent-neon: #0284C7;          /* High-Contrast Sky Blue */
            --accent-glow: rgba(2, 132, 199, 0.1);
            --border-color: rgba(10, 10, 12, 0.08);
            --font-accent: 'Syne', sans-serif;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --transition-tactile: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-main);
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            pointer-events: none;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 120px 20px 80px;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient Blue Background Glow */
        body::before {
            content: '';
            position: fixed;
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(2, 132, 199, 0.04) 0%, rgba(255,255,255,0) 70%);
            z-index: -1;
            pointer-events: none;
        }

        /* Structural Grid Line */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 10%;
            width: 1px;
            height: 100%;
            background: var(--border-color);
            z-index: -1;
            pointer-events: none;
        }

        /* --- SLEEK LIGHT GLASS NAVIGATION --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 24px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2000;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            font-family: var(--font-accent);
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--text-primary);
            text-transform: uppercase;
        }

        .logo span {
            color: var(--accent-neon);
        }

        .desktop-nav {
            display: flex;
            list-style: none;
            gap: 40px;
        }

        .desktop-nav a {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            transition: var(--transition-tactile);
        }

        .desktop-nav a:hover,
        .desktop-nav li.active a {
            color: var(--accent-neon);
        }

        /* --- EDITORIAL CONTAINER --- */
        .contact-card {
            background: var(--bg-card);
            width: 100%;
            max-width: 550px;
            padding: 50px 40px;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 30px 60px rgba(10, 10, 12, 0.03);
            z-index: 10;
            position: relative;
            overflow: hidden;
        }

        /* Left Accent Border */
        .contact-card::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 3px;
            height: 100%;
            background: linear-gradient(180deg, var(--accent-neon), transparent);
        }

        h1 {
            font-family: var(--font-accent);
            font-size: clamp(2.2rem, 4vw, 3rem);
            margin-bottom: 40px;
            font-weight: 800;
            letter-spacing: -1.5px;
            color: var(--text-primary);
            line-height: 1.1;
        }

        .contact-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 18px 24px;
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            transition: var(--transition-tactile);
            text-decoration: none;
            color: inherit;
        }

        .contact-item:hover {
            border-color: rgba(10, 10, 12, 0.2);
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(10, 10, 12, 0.04);
        }

        .icon-box {
            width: 46px;
            height: 46px;
            background: rgba(2, 132, 199, 0.06);
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--accent-neon);
            font-size: 1.1rem;
            transition: var(--transition-tactile);
            border: 1px solid rgba(2, 132, 199, 0.12);
        }

        .contact-item:hover .icon-box {
            background: var(--accent-neon);
            color: #ffffff;
            border-color: transparent;
        }

        .contact-details {
            display: flex;
            flex-direction: column;
        }

        .contact-details h3 {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .contact-details span {
            color: var(--text-primary);
            font-weight: 600;
            font-size: 1.05rem;
            word-break: break-word;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 40px;
            width: 100%;
            padding: 16px;
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            transition: var(--transition-tactile);
        }

        .back-btn:hover {
            background: var(--accent-neon);
            color: #ffffff;
            border-color: var(--accent-neon);
            transform: translateY(-2px);
            box-shadow: 0 15px 30px var(--accent-glow);
        }

        .reveal {
            opacity: 0;
        }

        @media (max-width: 480px) {
            .contact-card {
                padding: 35px 20px;
            }

            .contact-item {
                gap: 15px;
                padding: 14px 16px;
            }

            .contact-details span {
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>
    <div id="canvas-container"></div>

    <nav>
        <div class="logo">Abdullah<span>.</span></div>
        <ul class="desktop-nav">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="service.html">Services</a></li>
            <li class="active"><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <div class="contact-card">
        <h1 class="reveal">Contact Me</h1>

        <div class="contact-grid">
            <a href="mailto:forhadalpha08@email.com" class="contact-item reveal">
                <div class="icon-box">
                    <i class="fas fa-envelope"></i>
                </div>
                <div class="contact-details">
                    <h3>Email</h3>
                    <span>Send Email</span>
                </div>
            </a>

            <div class="contact-item reveal">
                <div class="icon-box">
                    <i class="fas fa-map-marker-alt"></i>
                </div>
                <div class="contact-details">
                    <h3>Location</h3>
                    <span>Bangladesh</span>
                </div>
            </div>

            <a href="https://wa.me/8801342900364" class="contact-item reveal" target="_blank">
                <div class="icon-box">
                    <i class="fab fa-whatsapp"></i>
                </div>
                <div class="contact-details">
                    <h3>WhatsApp</h3>
                    <span>Contact On WhatsApp</span>
                </div>
            </a>

            <a href="https://www.facebook.com/profile.php?id=61580779565120" target="_blank" class="contact-item reveal">
                <div class="icon-box">
                    <i class="fab fa-facebook"></i>
                </div>
                <div class="contact-details">
                    <h3>Facebook</h3>
                    <span>Facebook.com</span>
                </div>
            </a>
        </div>

        <a href="index.html" class="back-btn reveal">
            <i class="fas fa-arrow-left"></i> Return to Home
        </a>
    </div>

    <script>
        // --- 3D AMBIENT SILK FLOATING ENGINE (High-Tech Glass Aesthetic) ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });

        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        camera.position.z = 30;

        const bubbleCount = 15; // Kept clean and elegant
        const bubbles = [];
        const bubbleGroup = new THREE.Group();
        const bubbleGeo = new THREE.SphereGeometry(1, 32, 32);

        function createBubbleMaterial() {
            return new THREE.MeshPhysicalMaterial({
                color: 0x0284C7,             // Sky Blue Tint
                emissive: 0xFFFFFF,          // Clear glass core
                emissiveIntensity: 0.1,
                roughness: 0.05,
                metalness: 0.1,
                clearcoat: 1.0,
                clearcoatRoughness: 0.05,
                transmission: 0.85,          // Clean glass transmission
                ior: 1.5,
                thickness: 1.5,
                transparent: true,
                opacity: 0.12                // Subtle background visibility
            });
        }

        for (let i = 0; i < bubbleCount; i++) {
            const mesh = new THREE.Mesh(bubbleGeo, createBubbleMaterial());
            const scale = Math.random() * 2.0 + 0.5;
            mesh.scale.set(scale, scale, scale);
            mesh.position.x = (Math.random() - 0.5) * 55;
            mesh.position.y = (Math.random() - 0.5) * 45;
            mesh.position.z = (Math.random() - 0.5) * 15;

            mesh.userData = {
                speedY: (scale * 0.008) + 0.003,
                phaseX: Math.random() * Math.PI * 2,
                baseScale: scale
            };
            bubbleGroup.add(mesh);
            bubbles.push(mesh);
        }
        scene.add(bubbleGroup);

        // Studio Cool-Toned Lights
        const skyLight = new THREE.DirectionalLight(0xFFFFFF, 1.8);
        skyLight.position.set(10, 20, 10);
        scene.add(skyLight);

        const fillLight = new THREE.AmbientLight(0x0284C7, 0.3);
        scene.add(fillLight);

        // Dynamic Mouse Tracking Parallax
        const mouse = { x: 0, y: 0 };
        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now();

            bubbles.forEach(bubble => {
                const p = bubble.userData;
                bubble.position.y += p.speedY;
                bubble.position.x += Math.sin(time * 0.0008 + p.phaseX) * 0.01;

                if (bubble.position.y > 25) {
                    bubble.position.y = -25;
                    bubble.position.x = (Math.random() - 0.5) * 55;
                }
            });

            bubbleGroup.rotation.y += (mouse.x * 0.02 - bubbleGroup.rotation.y) * 0.05;
            bubbleGroup.rotation.x += (-mouse.y * 0.02 - bubbleGroup.rotation.x) * 0.05;

            renderer.render(scene, camera);
        }
        animate();

        // --- GSAP REVEAL ANIMATION (Matching Homepage Fluid Transitions) ---
        window.addEventListener('DOMContentLoaded', () => {
            gsap.to(".reveal", {
                opacity: 1,
                y: 0,
                duration: 0.8,
                stagger: 0.06,
                ease: "power3.out",
                startAt: { y: 25 }
            });
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
