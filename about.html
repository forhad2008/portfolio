<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me | Abdullah Forhad</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        /* --- BOLD & EDITORIAL DESIGN MATRIX (Matched to Home) --- */
        :root {
            --bg-cream: #FFFDF9;
            --text-espresso: #2C1E1A;
            --text-muted: #6E5D58;
            --accent-terracotta: #C25A3F;
            --accent-hover: #A44830;
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Inter', sans-serif;
            --border-color: rgba(44, 30, 26, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-sans);
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            pointer-events: none;
        }

        body {
            background-color: var(--bg-cream);
            color: var(--text-espresso);
            line-height: 1.6;
            padding: 80px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Fixed Editorial Guideline */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 10%;
            width: 1px;
            height: 100%;
            background: var(--border-color);
            z-index: -1;
            pointer-events: none;
        }

        .preview-container {
            max-width: 650px;
            width: 100%;
            background: #FFFFFF;
            border: 1px solid var(--border-color);
            padding: 50px 40px;
            box-shadow: 0 20px 40px rgba(44, 30, 26, 0.02);
            position: relative;
        }

        /* Editorial Vertical Accent Bar */
        .preview-container::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background: var(--accent-terracotta);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 35px;
            transition: color 0.3s, transform 0.3s;
            font-weight: 500;
        }

        .back-link:hover {
            color: var(--accent-terracotta);
            transform: translateX(-3px);
        }

        .project-header {
            margin-bottom: 40px;
        }

        .project-title {
            font-family: var(--font-serif);
            font-size: clamp(2.5rem, 5vw, 3.5rem);
            font-weight: 600;
            color: var(--text-espresso);
            line-height: 1.1;
            letter-spacing: -1px;
        }

        .project-category {
            color: var(--accent-terracotta);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
        }

        .info-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 20px;
            border-top: 1px solid var(--border-color);
            padding-top: 35px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: #FFFDF9;
            border: 1px solid var(--border-color);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .info-item:hover {
            border-color: var(--accent-terracotta);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(44, 30, 26, 0.04);
        }

        .info-item h3 {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-item span {
            color: var(--text-espresso);
            font-family: var(--font-serif);
            font-weight: 600;
            font-size: 1.1rem;
        }

        .highlight-text {
            color: var(--accent-terracotta) !important;
            font-style: italic;
            font-weight: 500 !important;
        }

        .reveal {
            opacity: 0;
        }

        @media (max-width: 480px) {
            .preview-container {
                padding: 35px 20px;
            }

            .info-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 6px;
            }
        }
    </style>
</head>

<body>

    <div id="canvas-container"></div>

    <div class="preview-container">
        <a href="index.html" class="back-link reveal">
            <i class="fas fa-arrow-left"></i> Return to Home
        </a>

        <header class="project-header">
            <span class="project-category reveal">Personal Profile</span>
            <h1 class="project-title reveal">About Me</h1>
        </header>

        <div class="info-grid">
            <div class="info-item reveal">
                <h3>First Name</h3>
                <span>Abdullah</span>
            </div>
            <div class="info-item reveal">
                <h3>Last Name</h3>
                <span>Forhad</span>
            </div>
            <div class="info-item reveal">
                <h3>Country</h3>
                <span>Bangladesh</span>
            </div>
            <div class="info-item reveal">
                <h3>Mentality</h3>
                <span class="highlight-text">Alpha</span>
            </div>
            <div class="info-item reveal">
                <h3>Profession</h3>
                <span class="highlight-text">Designing</span>
            </div>
            <div class="info-item reveal">
                <h3>Favorite Sport</h3>
                <span>Boxing</span>
            </div>
        </div>
    </div>

    <script>
        // --- 3D AMBIENT SILK FLOATING ENGINE (Adapted to Editorial Theme) ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });

        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        camera.position.z = 30;

        const bubbleCount = 20; // Reduced count for a cleaner, cleaner look
        const bubbles = [];
        const bubbleGroup = new THREE.Group();
        const bubbleGeo = new THREE.SphereGeometry(1, 32, 32);

        function createBubbleMaterial() {
            return new THREE.MeshPhysicalMaterial({
                color: 0xC25A3F,           // Terracotta base
                emissive: 0xFFFDF9,        // Soft cream glow core
                emissiveIntensity: 0.1,
                roughness: 0.1,
                metalness: 0.05,
                clearcoat: 0.8,
                clearcoatRoughness: 0.1,
                transmission: 0.6,          // High transparency elegant mesh
                ior: 1.2,
                thickness: 2.0,
                transparent: true,
                opacity: 0.25               // Kept very subtle for light mode
            });
        }

        for (let i = 0; i < bubbleCount; i++) {
            const mesh = new THREE.Mesh(bubbleGeo, createBubbleMaterial());
            const scale = Math.random() * 1.5 + 0.5;
            mesh.scale.set(scale, scale, scale);
            mesh.position.x = (Math.random() - 0.5) * 55;
            mesh.position.y = (Math.random() - 0.5) * 45;
            mesh.position.z = (Math.random() - 0.5) * 15;

            mesh.userData = {
                speedY: (scale * 0.01) + 0.005,
                phaseX: Math.random() * Math.PI * 2,
                baseScale: scale
            };
            bubbleGroup.add(mesh);
            bubbles.push(mesh);
        }
        scene.add(bubbleGroup);

        // Studio warm lightning rigs
        const skyLight = new THREE.DirectionalLight(0xFFFDF9, 2.0);
        skyLight.position.set(10, 20, 8);
        scene.add(skyLight);

        const fillLight = new THREE.AmbientLight(0xC25A3F, 0.4);
        scene.add(fillLight);

        // Parallax Mouse tracking
        const mouse = { x: 0, y: 0 };
        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now();

            bubbles.forEach(bubble => {
                const p = bubble.userData;
                bubble.position.y += p.speedY;
                bubble.position.x += Math.sin(time * 0.001 + p.phaseX) * 0.01;

                if (bubble.position.y > 25) {
                    bubble.position.y = -25;
                    bubble.position.x = (Math.random() - 0.5) * 55;
                }
            });

            bubbleGroup.rotation.y += (mouse.x * 0.03 - bubbleGroup.rotation.y) * 0.05;
            bubbleGroup.rotation.x += (-mouse.y * 0.03 - bubbleGroup.rotation.x) * 0.05;

            renderer.render(scene, camera);
        }
        animate();

        // --- GSAP REVEAL ANIMATION (Smooth Entry) ---
        window.addEventListener('DOMContentLoaded', () => {
            gsap.to(".reveal", {
                opacity: 1,
                y: 0,
                duration: 1,
                stagger: 0.08,
                ease: "power3.out",
                startAt: { y: 30 }
            });
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
