<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>About Me | Abdullah Forhad</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Syne:wght@500;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        /* --- HIGH-CONTRAST LIGHT MODE SYSTEM (Matched to Home) --- */
        :root {
            --bg-dark: #FFFFFF;
            --bg-card: #F4F7FA;
            --text-primary: #0F172A;
            --text-muted: #64748B;
            --accent-neon: #0284C7;
            --accent-glow: rgba(2, 132, 199, 0.15);
            --border-color: rgba(15, 23, 42, 0.08);
            --font-accent: 'Syne', sans-serif;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --transition-tactile: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-main);
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            pointer-events: none;
        }

        html,
        body {
            width: 100%;
            max-width: 100vw;
            overflow-x: hidden;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 140px 8% 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
            box-sizing: border-box;
        }

        /* Ambient Blue Background Glow */
        body::before {
            content: '';
            position: fixed;
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(2, 132, 199, 0.06) 0%, rgba(255, 255, 255, 0) 70%);
            z-index: -1;
            pointer-events: none;
        }

        /* --- SLEEK LIGHT GLASS NAVIGATION --- */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 24px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2000;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-color);
            box-sizing: border-box;
        }

        .logo {
            font-family: var(--font-accent);
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--text-primary);
            text-transform: uppercase;
        }

        .logo span {
            color: var(--accent-neon);
        }

        .desktop-nav {
            display: flex;
            list-style: none;
            gap: 40px;
        }

        .desktop-nav a {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            transition: var(--transition-tactile);
        }

        .desktop-nav a:hover,
        .desktop-nav li.active a {
            color: var(--accent-neon);
        }

        /* Hamburger Styles matching Homepage */
        .hamburger {
            cursor: pointer;
            z-index: 2100;
            display: none;
            flex-direction: column;
            gap: 6px;
            padding: 4px;
        }

        .hamburger div {
            width: 25px;
            height: 2px;
            background: var(--text-primary);
            transition: var(--transition-tactile);
        }

        .hamburger.active div:nth-child(1) {
            transform: translateY(8px) rotate(45deg);
        }

        .hamburger.active div:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active div:nth-child(3) {
            transform: translateY(-8px) rotate(-45deg);
        }

        .menu-window {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1500;
            transform: translateY(-100%);
            transition: transform 0.6s cubic-bezier(0.85, 0, 0.15, 1);
            border-bottom: 1px solid var(--border-color);
            box-sizing: border-box;
            overflow: hidden;
        }

        .menu-window.open {
            transform: translateY(0);
        }

        .menu-window ul {
            list-style: none;
            text-align: center;
            width: 100%;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .menu-window li {
            margin: 24px 0;
        }

        .menu-window a {
            font-family: var(--font-accent);
            font-size: 2rem;
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 700;
            transition: var(--transition-tactile);
            display: block;
        }

        .menu-window a:hover {
            color: var(--accent-neon);
        }

        /* --- MODERN ABOUT BOX --- */
        .preview-container {
            max-width: 650px;
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 40px 80px rgba(15, 23, 42, 0.04);
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
        }

        .preview-container::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 3px;
            height: 100%;
            background: linear-gradient(180deg, var(--accent-neon), transparent);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 35px;
            transition: var(--transition-tactile);
            font-weight: 600;
        }

        .back-link:hover {
            color: var(--accent-neon);
            transform: translateX(-3px);
        }

        .project-header {
            margin-bottom: 40px;
        }

        .project-title {
            font-family: var(--font-accent);
            font-size: clamp(2.4rem, 5vw, 3.8rem);
            font-weight: 800;
            color: var(--text-primary);
            line-height: 1.1;
            letter-spacing: -1.5px;
        }

        .project-category {
            color: var(--accent-neon);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            display: block;
            margin-bottom: 8px;
        }

        /* --- ASYMMETRIC METRIC LIST --- */
        .info-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 20px;
            border-top: 1px solid var(--border-color);
            padding-top: 35px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 24px;
            background: #FFFFFF;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            transition: var(--transition-tactile);
        }

        .info-item:hover {
            border-color: rgba(15, 23, 42, 0.15);
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.04);
        }

        .info-item h3 {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-item span {
            color: var(--text-primary);
            font-weight: 600;
            font-size: 1.05rem;
        }

        .highlight-text {
            color: var(--accent-neon) !important;
            font-weight: 700 !important;
        }

        .reveal {
            opacity: 0;
        }

        /* --- RESPONSIVE MOBILE FIXES --- */
        @media (max-width: 991px) {
            .desktop-nav {
                display: none;
            }

            .hamburger {
                display: flex;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 120px 16px 60px;
            }

            nav {
                padding: 16px 16px;
            }

            .preview-container {
                padding: 36px 20px;
                border-radius: 16px;
            }

            .info-item {
                padding: 16px 20px;
            }
        }

        @media (max-width: 480px) {
            .info-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 6px;
            }
        }
    </style>
</head>

<body>

    <div id="canvas-container"></div>

    <nav>
        <div class="logo">Profile<span>.</span></div>
        <ul class="desktop-nav">
            <li><a href="index.html">Home</a></li>
            <li class="active"><a href="about.html">About</a></li>
            <li><a href="service.html">Services</a></li>
            <li><a href="index.html#contact">Contact</a></li>
        </ul>
        <div class="hamburger" id="hamburger">
            <div></div>
            <div></div>
            <div></div>
        </div>
    </nav>

    <div class="menu-window" id="menu-window">
        <ul id="mobile-nav-links"></ul>
    </div>

    <div class="preview-container">
        <a href="index.html" class="back-link reveal">
            <i class="fas fa-arrow-left"></i> Return to Home
        </a>

        <header class="project-header">
            <span class="project-category reveal">Personal Profile</span>
            <h1 class="project-title reveal">About Me</h1>
        </header>

        <div class="info-grid">
            <div class="info-item reveal">
                <h3>First Name</h3>
                <span>Abdullah</span>
            </div>
            <div class="info-item reveal">
                <h3>Last Name</h3>
                <span>Forhad</span>
            </div>
            <div class="info-item reveal">
                <h3>Country</h3>
                <span>Bangladesh</span>
            </div>
            <div class="info-item reveal">
                <h3>Mentality</h3>
                <span class="highlight-text">Alpha</span>
            </div>
            <div class="info-item reveal">
                <h3>Profession</h3>
                <span class="highlight-text">Designing</span>
            </div>
            <div class="info-item reveal">
                <h3>Favorite Sport</h3>
                <span>Boxing</span>
            </div>
        </div>
    </div>

    <script>
        // --- MOBILE MENU POPULATION & TOGGLE ENGINE ---
        document.addEventListener("DOMContentLoaded", () => {
            const menuItems = [
                { label: "Home", url: "index.html" },
                { label: "About Me", url: "about.html" },
                { label: "Services", url: "service.html" },
                { label: "Contact", url: "index.html#contact" }
            ];

            const hamburger = document.getElementById('hamburger');
            const menuWindow = document.getElementById('menu-window');
            const mobileNavLinksContainer = document.getElementById('mobile-nav-links');

            if (mobileNavLinksContainer) {
                mobileNavLinksContainer.innerHTML = menuItems.map(item => `
                    <li><a href="${item.url}">${item.label}</a></li>
                `).join('');
            }

            if (hamburger && menuWindow) {
                hamburger.addEventListener('click', () => {
                    hamburger.classList.toggle('active');
                    menuWindow.classList.toggle('open');
                });
            }
        });

        // --- 3D AMBIENT SILK FLOATING ENGINE (High-Tech Glass Aesthetic) ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });

        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        camera.position.z = 30;

        const bubbleCount = 15;
        const bubbles = [];
        const bubbleGroup = new THREE.Group();
        const bubbleGeo = new THREE.SphereGeometry(1, 32, 32);

        function createBubbleMaterial() {
            return new THREE.MeshPhysicalMaterial({
                color: 0x0284C7,
                emissive: 0xFFFFFF,
                emissiveIntensity: 0.1,
                roughness: 0.05,
                metalness: 0.1,
                clearcoat: 1.0,
                clearcoatRoughness: 0.05,
                transmission: 0.85,
                ior: 1.5,
                thickness: 1.5,
                transparent: true,
                opacity: 0.12
            });
        }

        for (let i = 0; i < bubbleCount; i++) {
            const mesh = new THREE.Mesh(bubbleGeo, createBubbleMaterial());
            const scale = Math.random() * 2.0 + 0.5;
            mesh.scale.set(scale, scale, scale);
            mesh.position.x = (Math.random() - 0.5) * 55;
            mesh.position.y = (Math.random() - 0.5) * 45;
            mesh.position.z = (Math.random() - 0.5) * 15;

            mesh.userData = {
                speedY: (scale * 0.008) + 0.003,
                phaseX: Math.random() * Math.PI * 2,
                baseScale: scale
            };
            bubbleGroup.add(mesh);
            bubbles.push(mesh);
        }
        scene.add(bubbleGroup);

        const skyLight = new THREE.DirectionalLight(0xFFFFFF, 1.8);
        skyLight.position.set(10, 20, 10);
        scene.add(skyLight);

        const fillLight = new THREE.AmbientLight(0x0284C7, 0.3);
        scene.add(fillLight);

        const mouse = { x: 0, y: 0 };
        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now();

            bubbles.forEach(bubble => {
                const p = bubble.userData;
                bubble.position.y += p.speedY;
                bubble.position.x += Math.sin(time * 0.0008 + p.phaseX) * 0.01;

                if (bubble.position.y > 25) {
                    bubble.position.y = -25;
                    bubble.position.x = (Math.random() - 0.5) * 55;
                }
            });

            bubbleGroup.rotation.y += (mouse.x * 0.02 - bubbleGroup.rotation.y) * 0.05;
            bubbleGroup.rotation.x += (-mouse.y * 0.02 - bubbleGroup.rotation.x) * 0.05;

            renderer.render(scene, camera);
        }
        animate();

        // --- GSAP REVEAL ANIMATION (Matching Homepage Fluid Transitions) ---
        window.addEventListener('DOMContentLoaded', () => {
            gsap.to(".reveal", {
                opacity: 1,
                y: 0,
                duration: 0.8,
                stagger: 0.06,
                ease: "power3.out",
                startAt: { y: 25 }
            });
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
