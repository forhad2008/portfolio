<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Abdullah The Legend</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <style>
        /* --- WALLPAPER INSPIRED THEME PALETTE --- */
        :root {
            --bg-main: #1A1A1E;          /* Deep obsidian background */
            --bg-card: #26262B;          /* Shadow charcoal for cards/forms */
            --accent-neon: #FF1053;      /* Katana neon crimson/pink */
            --accent-deep: #990033;      /* Deep wine red for hovers/borders */
            
            --text-primary: #E5E7EB;     /* Misty cloud grey text */
            --text-muted: #9CA3AF;       /* Storm ash silver text */
            --input-border: #3F3F46;     /* Dark steel border color */
            --font-base: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Basic Page Resets to apply the dark samurai atmosphere */
        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: var(--font-base);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .contact-section {
            padding: 80px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .section-subtitle {
            color: var(--accent-neon);
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 2px;
            font-weight: bold;
        }

        .section-title {
            font-size: 2.5rem;
            margin: 10px 0 0;
            color: var(--text-primary);
        }

        .contact-grid {
            display: flex;
            justify-content: center;
            margin-bottom: 50px;
        }

        .contact-form-card {
            background-color: var(--bg-card);
            border: 1px solid var(--input-border);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .form-group-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            flex: 1;
            margin-bottom: 20px;
        }

        .input-group.full-width {
            margin-bottom: 20px;
        }

        .input-group label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .input-group input, 
        .input-group textarea {
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--input-border);
            color: var(--text-primary);
            padding: 12px 16px;
            border-radius: 6px;
            outline: none;
            font-size: 1rem;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .input-group input:focus, 
        .input-group textarea:focus {
            border-color: var(--accent-neon);
            box-shadow: 0 0 8px rgba(255, 16, 83, 0.3);
        }

        .input-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .form-actions-row {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .btn {
            cursor: pointer;
            border: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .btn-small {
            background-color: var(--accent-neon);
            color: #ffffff;
            padding: 12px 28px;
            border-radius: 6px;
            font-size: 1rem;
        }

        .btn-small:hover {
            background-color: var(--accent-deep);
            transform: translateY(-2px);
        }

        .btn-small:disabled {
            cursor: not-allowed;
        }

        .form-status {
            font-size: 0.9rem;
            margin-top: 12px;
        }

        /* Links & Minimal Footer Section Styles */
        .info-minimal-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 30px;
        }

        .minimal-underlined-link {
            color: var(--text-primary);
            text-decoration: none;
            border-bottom: 1px solid var(--accent-neon);
            padding-bottom: 2px;
            transition: color 0.3s, border-color 0.3s;
        }

        .minimal-underlined-link:hover {
            color: var(--accent-neon);
            border-color: var(--text-primary);
        }

        .minimal-icon-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 15px;
        }

        .minimal-icon-link {
            color: var(--text-muted);
            font-size: 1.3rem;
            transition: color 0.3s, transform 0.3s;
        }

        .minimal-icon-link:hover {
            color: var(--accent-neon);
            transform: scale(1.15);
        }

        footer {
            border-top: 1px solid var(--input-border);
            padding: 30px 20px;
            background-color: rgba(0, 0, 0, 0.3);
        }

        .footer-bottom {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            flex-wrap: wrap;
            gap: 15px;
        }

        .footer-bottom-links a {
            color: var(--text-muted);
            text-decoration: none;
            margin-left: 20px;
            transition: color 0.3s;
        }

        .footer-bottom-links a:hover {
            color: var(--accent-neon);
        }

        @media (max-width: 768px) {
            .form-group-row {
                flex-direction: column;
                gap: 0;
            }
            .footer-bottom {
                flex-direction: column;
                text-align: center;
            }
            .footer-bottom-links a {
                margin: 0 10px;
            }
        }
    </style>
</head>
<body>

                </form>
            </div>
        </div> <div class="info-minimal-container">
            <div class="minimal-text-block">
                <a href="mailto:forhadalpha08@gmail.com" class="minimal-underlined-link">Email</a>
            </div>
        
            <div class="minimal-text-block">
                <a href="https://wa.me/8801342900364" class="minimal-underlined-link" target="_blank">WhatsApp</a>
            </div>
             
            <div class="social-connect-block">
                <div class="minimal-icon-row">
                    <a href="https://www.instagram.com/abdullah.thelegend2008?igsh=YWd3a3dqdmc4cXo2" target="_blank" class="minimal-icon-link" title="Instagram">
                        <i class="fa-brands fa-instagram"></i>
                    </a>
                    <a href="https://www.tiktok.com/@abdullah.thelegen?_r=1&_t=ZS-988bupiVj1w" target="_blank" class="minimal-icon-link" title="TikTok">
                        <i class="fa-brands fa-tiktok"></i>
                    </a>
                    <a href="https://www.facebook.com/profile.php?id=61580779565120" target="_blank" class="minimal-icon-link" title="Facebook">

                    <a href="https://www.reddit.com/user/Alternative_One7727/" target="_blank" class="minimal-icon-link" title="Reddit">

                    <a href="https://pin.it/30WdMXBOi" target="_blank" class="minimal-icon-link" title="Pinterest">

                    <a href="https://github.com/forhad2008" target="_blank" class="minimal-icon-link" title="GitHub">

                    <a href="https://www.linkedin.com/in/abdullah-forhad-bb0470423?utm_source=share_via&utm_content=profile&utm_medium=member_android" target="_blank" class="minimal-icon-link" title="LinkedIn">
                        <i class="fa-brands fa-linkedin"></i>

                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="footer-bottom">
            <span>&copy; 2008 @abdullah.theLegend.</span>
            <div class="footer-bottom-links">
                <a href="about.html">Privacy Policy</a>
                <a href="about.html">Terms of Service</a>
            </div>
        </div>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // 1. DATA STORE
            const menuItems = [
                { label: "Home", url: "index.html" },
                { label: "About Me", url: "about.html" },
                { label: "Services", url: "service.html" },
                { label: "Contact", url: "#contact" }
            ];

            const projectData = [
                { id: 1, category: "business-card", title: "Business Card Design", subtitle: "Identity Unit", img: "19.2.webp", alt: "Minimalist Card", views: 420, hearts: 89, target: "_self", themeColor: "#0284C7" },
                { id: 2, category: "business-card", title: "Geometric Pattern Card", subtitle: "Identity Unit", img: "24.2.webp", alt: "Abstract Geometric", views: 312, hearts: 64, target: "_self", themeColor: "#0369A1" },
                { id: 3, category: "business-card", title: "Creative Agency Card", subtitle: "Identity Unit", img: "27.2.webp", alt: "Premium Creative", views: 580, hearts: 142, target: "_self", themeColor: "#0EA5E9" },
                { id: 4, category: "business-card", title: "Vintage Luxury Card", subtitle: "Identity Unit", img: "28.2.webp", alt: "Modern Corporate", views: 290, hearts: 55, target: "_blank", themeColor: "#B45309" },
                { id: 5, category: "business-card", title: "Premium Finished Card", subtitle: "Identity Unit", img: "29.2.webp", alt: "Luxury Elegant", views: 740, hearts: 210, target: "_self", themeColor: "#0F172A" },
                { id: 6, category: "business-card", title: "Corporate Card", subtitle: "Identity Unit", img: "30.2.webp", alt: "Executive Design", views: 395, hearts: 118, target: "_self", themeColor: "#334155" },
                { id: 7, category: "business-card", title: "Premium Finished Card", subtitle: "Business Card", img: "33.2.webp", alt: "Luxury Elegant", views: 650, hearts: 210, target: "_self", themeColor: "#059669" },
                { id: 8, category: "business-card", title: "Professional Business Card", subtitle: "Business Card", img: "1.2.webp", alt: "Creative Elegant", views: 540, hearts: 310, target: "_self", themeColor: "#2563EB" },
                { id: 9, category: "business-card", title: "Radio Creative Business Card", subtitle: "Business Card", img: "7.1.webp", alt: "Bold Creative", views: 740, hearts: 320, target: "_self", themeColor: "#DC2626" },
                { id: 10, category: "business-card", title: "Premium Creative Business Card", subtitle: "Business Card", img: "14.2.webp", alt: "Creative Design", views: 656, hearts: 203, target: "_self", themeColor: "#7C3AED" },
                { id: 11, category: "logo", title: "Fashion Logo Concept", subtitle: "System Logo", img: "26.webp", alt: "Modern Monogram", views: 610, hearts: 180, target: "_self", themeColor: "#EC4899" },
                { id: 12, category: "logo", title: "Letter & Shape Logo Design", subtitle: "System Logo", img: "3.webp", alt: "Modern Logo", views: 720, hearts: 215, url: "3.webp", target: "_self", themeColor: "#F59E0B" },
                { id: 13, category: "website", title: "Aesthetic Lifestyle Branding Website", subtitle: "Identity & Branding", img: "bag2.webp", alt: "Identity & Branding", views: 4280, hearts: 2714, url: "https://forhad2008.github.io/boraldo-store/", target: "_self", themeColor: "#0284C7" },
                { id: 14, category: "website", title: "Luxury Restaurant Website", subtitle: "Web Experience", img: "res.png", alt: "Software Interface", views: 4280, hearts: 2714, url: "https://forhad2008.github.io/restaurant1-/", target: "_self", themeColor: "#0369A1" }
            ];

            const filterCategories = [
                { slug: "all", label: "All Designs" },
                { slug: "business-card", label: "Business Cards" },
                { slug: "logo", label: "Logos" },
                { slug: "website", label: "Websites" }
            ];

            let currentFilter = 'all';
            window.allowedProjectIds = [1, 2, 13, 14];

            // 2. CONTROLLER LOGIC
            function applyMainPageDesign(targetId) {
                const targetProject = projectData.find(project => project.id === targetId);
                if (!targetProject) return;

                // Overrides with dynamically computed theme values if existing
                if (targetProject.themeColor) {
                    document.documentElement.style.setProperty('--accent-neon', targetProject.themeColor);
                }
                const profileImg = document.querySelector('.profile-container img');
                if (profileImg) {
                    profileImg.src = targetProject.img;
                    profileImg.alt = targetProject.alt;
                }
                const heroDesc = document.querySelector('.hero-desc');
                if (heroDesc) {
                    heroDesc.innerHTML = `Featuring our project: <strong>${targetProject.title}</strong>. I am Abdullah Forhad, a graphic designer and web developer bridging the space between stunning visual aesthetics and production-grade software performance.`;
                }
            }

            window.changeMainPageDesignById = applyMainPageDesign;

            // 3. MOBILE INTERFACE POPULATION
            const hamburger = document.getElementById('hamburger');
            const menuWindow = document.getElementById('menu-window');
            const mobileNavLinksContainer = document.getElementById('mobile-nav-links');

            if (mobileNavLinksContainer) {
                mobileNavLinksContainer.innerHTML = menuItems.map(item => `
                    <li><a href="${item.url}">${item.label}</a></li>
                `).join('');
            }

            if (hamburger && menuWindow) {
                hamburger.addEventListener('click', () => {
                    hamburger.classList.toggle('active');
                    menuWindow.classList.toggle('open');
                });
                menuWindow.querySelectorAll('a').forEach(link => {
                    link.addEventListener('click', () => {
                        hamburger.classList.remove('active');
                        menuWindow.classList.remove('open');
                    });
                });
            }

            // 4. TICKER ANIMATION
            if (typeof gsap !== "undefined" && document.getElementById("scroller-track")) {
                gsap.timeline({ repeat: -1 })
                    .to("#scroller-track", { y: "-50%", duration: 1.6, delay: 2.2, ease: "power4.inOut" })
                    .to("#scroller-track", { y: "0%", duration: 1.6, delay: 2.2, ease: "power4.inOut" });
            }

            // 5. RENDERING DYNAMIC FILTERS
            const filterNav = document.getElementById('filterNav');
            if (filterNav) {
                filterNav.innerHTML = filterCategories.map(cat => `
                    <button class="filter-btn ${cat.slug === 'all' ? 'active' : ''}" data-filter="${cat.slug}">
                        ${cat.label}
                    </button>
                `).join('');
            }

            // 6. GALLERY RENDER ENGINE
            const designGrid = document.getElementById('designGrid');
            const seeMoreBtn = document.getElementById('showcaseSeeMoreBtn');

            if (seeMoreBtn) seeMoreBtn.style.display = 'none';

            function renderShowcase() {
                if (!designGrid) return;
                let filteredProjects = projectData.filter(project => currentFilter === 'all' || project.category === currentFilter);

                if (currentFilter === 'all' && window.allowedProjectIds.length > 0) {
                    filteredProjects = filteredProjects.filter(project => window.allowedProjectIds.includes(project.id));
                }

                designGrid.innerHTML = filteredProjects.map(project => {
                    const detailUrl = project.url ? project.url : `${project.id}.html`;
                    const fallbackText = encodeURIComponent(project.title);

                    return `
                        <a href="${detailUrl}" class="design-card-link" target="${project.target}" data-category="${project.category}">
                            <div class="design-card">
                                <div class="card-img-wrapper">
                                    <img src="${project.img}" alt="${project.alt}" onerror="this.src='https://placehold.co/600x450/eeeeee/0284C7?text=${fallbackText}'">
                                    <div class="card-overlay">
                                        <div class="card-overlay-content">
                                            <h4>${project.alt}</h4>
                                            <span>${project.subtitle}</span>
                                            <button class="card-action-btn">
                                                <span>View Details</span> <i class="fa-solid fa-arrow-right"></i>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                                <div class="card-meta-info">
                                    <span class="card-title">${project.title}</span>
                                    <div class="card-stats">
                                        <span><i class="far fa-eye"></i> ${project.views}</span>
                                        <span><i class="far fa-heart"></i> ${project.hearts}</span>
                                    </div>
                                </div>
                            </div>
                        </a>
                    `;
                }).join('');
            }

            window.refreshShowcaseGallery = renderShowcase;

            if (filterNav) {
                filterNav.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.addEventListener('click', function () {
                        filterNav.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                        this.classList.add('active');
                        currentFilter = this.getAttribute('data-filter');

                        if (typeof gsap !== "undefined" && document.getElementById("designGrid")) {
                            gsap.fromTo("#designGrid", { opacity: 0.2, y: 15 }, { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" });
                        }
                        renderShowcase();
                    });
                });
            }

            // 7. FORM SUBMISSION GATEWAY CONTROLLER
            const meetingDate = document.getElementById("meetingDate");
            if (meetingDate) {
                const today = new Date();
                const year = today.getFullYear();
                const month = String(today.getMonth() + 1).padStart(2, "0");
                const day = String(today.getDate()).padStart(2, "0");
                meetingDate.min = `${year}-${month}-${day}`;
            }

            const contactForm = document.getElementById('portfolioContactForm');
            const submitBtn = document.getElementById('submitFormBtn');
            const statusMsg = document.getElementById('formStatusMessage');
            const googleScriptUrl = 'https://script.google.com/macros/s/AKfycbwIbbSk0A5EpL6DmaU95rvMdyfCnnwGGyGa5IW5CnT24Abl5mUwVljw870VA9UzZd2U/exec';

            if (contactForm) {
                contactForm.addEventListener('submit', (e) => {
                    e.preventDefault();

                    submitBtn.disabled = true;
                    submitBtn.style.opacity = '0.6';
                    statusMsg.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> Dispatching details safely...`;
                    statusMsg.style.color = 'var(--text-muted)';

                    const formData = new FormData(contactForm);
                    const searchParams = new URLSearchParams();
                    for (const pair of formData.entries()) {
                        searchParams.append(pair[0], pair[1]);
                    }

                    fetch(googleScriptUrl, {
                        method: 'POST',
                        body: searchParams,
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded'
                        },
                        redirect: 'follow'
                    })
                    .then(response => {
                        statusMsg.style.color = '#10B981';
                        statusMsg.innerHTML = `<i class="fa-solid fa-circle-check"></i> Project dispatched! Check email shortly.`;
                        contactForm.reset();
                    })
                    .catch(error => {
                        statusMsg.style.color = '#EF4444';
                        statusMsg.innerHTML = `<i class="fa-solid fa-circle-xmark"></i> Connection dropped. Send via mailto channel directly.`;
                        console.error('Error details:', error);
                    })
                    .finally(() => {
                        submitBtn.disabled = false;
                        submitBtn.style.opacity = '1';
                        if (typeof gsap !== "undefined" && statusMsg) {
                            gsap.fromTo(statusMsg, { opacity: 0, y: 5 }, { opacity: 1, y: 0, duration: 0.4 });
                        }
                    });
                });
            }

            applyMainPageDesign();
            renderShowcase();
        });
    </script>
</body>
</html>
